---
name: test

on:
  pull_request:
    branches:
    - main

  push:
    branches:
    - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Go environment
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: acceptance/go.mod
        cache: true
        cache-dependency-path: acceptance/go.sum

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        working-directory: acceptance

    - name: Run ShellCheck
      run: shellcheck create-oci.sh use-oci.sh select-oci-auth.sh oras_opts.sh entrypoint.sh hack/demo.sh

  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Go environment
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: acceptance/go.mod
        cache: true
        cache-dependency-path: acceptance/go.sum

    - name: Install shellspec and kcov
      # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md#homebrew-note
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew tap shellspec/shellspec
        brew install shellspec kcov

    - name: Run checks
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        make test

    - name: Upload shell coverage to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        use_oidc: true
        flags: shellspec-tests
        files: coverage/cobertura.xml
        disable_search: true
        fail_ci_if_error: false

    - name: Upload Go coverage to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        use_oidc: true
        flags: acceptance-tests
        files: acceptance/coverage.out
        disable_search: true
        fail_ci_if_error: false

    - name: Upload bash acceptance coverage to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        use_oidc: true
        flags: bash-acceptance-tests
        files: acceptance/bash-coverage.xml
        disable_search: true
        fail_ci_if_error: false
