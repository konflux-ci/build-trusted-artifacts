---
name: test

on:
  pull_request:
    branches:
    - main

  push:
    branches:
    - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go environment
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: acceptance/go.mod
        cache: true
        cache-dependency-path: acceptance/go.sum

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      with:
        working-directory: acceptance

    - name: Run ShellCheck
      run: shellcheck create-oci.sh use-oci.sh select-oci-auth.sh oras_opts.sh entrypoint.sh hack/demo.sh

  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Go environment
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: acceptance/go.mod
        cache: true
        cache-dependency-path: acceptance/go.sum

    - name: Install shellspec and kcov
      # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md#homebrew-note
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew tap shellspec/shellspec
        brew install shellspec kcov

    - name: Run checks
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        make test

    - name: Upload shell coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
      with:
        use_oidc: true
        flags: shellspec-tests
        files: coverage/cobertura.xml
        disable_search: true
        fail_ci_if_error: false

    - name: Upload Go coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
      with:
        use_oidc: true
        flags: acceptance-tests
        files: acceptance/coverage.out
        disable_search: true
        fail_ci_if_error: false

    - name: Upload bash acceptance coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
      with:
        use_oidc: true
        flags: bash-acceptance-tests
        files: acceptance/bash-coverage.xml
        disable_search: true
        fail_ci_if_error: false
