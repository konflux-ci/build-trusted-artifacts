---
name: test

on:
  pull_request:
    branches:
    - main

  push:
    branches:
    - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Go environment
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version-file: acceptance/go.mod
        cache: true
        cache-dependency-path: acceptance/go.sum

    - name: Install shellspec and kcov
      # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md#homebrew-note
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew tap shellspec/shellspec
        brew install shellspec kcov

    - name: Run checks
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        make test

    - name: Upload shell coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: shellspec-tests
        files: coverage/cobertura.xml
        disable_search: true
        fail_ci_if_error: false

    - name: Upload Go coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: acceptance-tests
        files: acceptance/coverage.out
        disable_search: true
        fail_ci_if_error: false
